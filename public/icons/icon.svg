<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ace Your Permit">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square, blue, fills full frame -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Steering wheel rim -->
  <circle cx="256" cy="270" r="172" fill="none" stroke="#0F172A" stroke-width="14"/>
  <circle cx="256" cy="270" r="172" fill="none" stroke="#3B82F6" stroke-width="6" opacity="0.5"/>

  <!-- Wheel spokes (bottom, steering-wheel silhouette) -->
  <path d="M 176 366 Q 176 320 220 320 Q 176 320 176 366 Z" fill="none" stroke="#0F172A" stroke-width="10" stroke-linejoin="round"/>
  <path d="M 336 366 Q 336 320 292 320 Q 336 320 336 366 Z" fill="none" stroke="#0F172A" stroke-width="10" stroke-linejoin="round"/>

  <!-- Dial face -->
  <circle cx="256" cy="270" r="140" fill="#F8FAFC"/>

  <!-- Tick marks -->
  <g stroke="#0F172A" stroke-width="7" stroke-linecap="round">
    <line x1="256" y1="140" x2="256" y2="118"/>
    <line x1="196" y1="156" x2="184" y2="138"/>
    <line x1="150" y1="200" x2="130" y2="188"/>
    <line x1="316" y1="156" x2="328" y2="138"/>
    <line x1="362" y1="200" x2="382" y2="188"/>
  </g>

  <!-- Speed arc accent -->
  <path d="M 176 320 A 108 108 0 0 1 256 186" fill="none" stroke="#F97316" stroke-width="10" stroke-linecap="round" opacity="0.85"/>

  <!-- Needle: sweeping up-right, arrow tip -->
  <line x1="212" y1="316" x2="330" y2="196" stroke="#F97316" stroke-width="20" stroke-linecap="round"/>
  <path d="M 330 196 L 366 172 L 344 214 Z" fill="#F97316"/>

  <!-- Motion spark -->
  <g fill="#F97316">
    <path d="M 378 150 l 8 22 l -22 -8 Z"/>
    <circle cx="392" cy="188" r="5"/>
  </g>

  <!-- Pivot hub -->
  <circle cx="256" cy="270" r="20" fill="#F97316"/>
  <circle cx="256" cy="270" r="10" fill="#EA580C"/>
</svg>
