<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ace Your Permit">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square, fills full frame, no fine detail so it reads at any size -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Bold single-stroke checkmark: "Ace" energy, reads clearly from 16px to 512px -->
  <path d="M 140 270 L 228 358 L 384 172" fill="none" stroke="#FFFFFF" stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Orange tip accent on the checkmark's leading stroke -->
  <circle cx="384" cy="172" r="32" fill="#F97316"/>
</svg>
