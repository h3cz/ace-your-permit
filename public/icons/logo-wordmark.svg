<!-- Wordmark: "Ace Your Permit". Steering-wheel speedometer logomark + 2-tone wordmark.
     "Ace Your" in brand blue, "Permit" in slate-900, orange accent under. -->
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="80" viewBox="0 0 520 80" role="img" aria-label="Ace Your Permit">
  <defs>
    <linearGradient id="bgMark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- ── LOGOMARK (64×64 squircle, steering-wheel speedometer) ── -->
  <rect x="0" y="8" width="64" height="64" rx="14" fill="url(#bgMark)"/>

  <!-- Wheel rim -->
  <circle cx="32" cy="42" r="21" fill="none" stroke="#0F172A" stroke-width="2"/>

  <!-- Wheel spokes -->
  <path d="M 21 55 Q 21 46 27 46 Q 21 46 21 55 Z" fill="none" stroke="#0F172A" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M 43 55 Q 43 46 37 46 Q 43 46 43 55 Z" fill="none" stroke="#0F172A" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Dial face -->
  <circle cx="32" cy="42" r="17" fill="#F8FAFC"/>

  <!-- Tick at top -->
  <line x1="32" y1="27" x2="32" y2="23" stroke="#0F172A" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Orange needle sweeping up-right with arrow tip -->
  <line x1="24" y1="50" x2="43" y2="30" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
  <path d="M 43 30 L 49 24 L 45 33 Z" fill="#F97316"/>

  <!-- Pivot hub -->
  <circle cx="32" cy="42" r="3" fill="#F97316"/>

  <!-- Orange accent dot at bottom-right of logomark -->
  <circle cx="51" cy="62" r="4" fill="#F97316"/>

  <!-- ── WORDMARK: "DriveMaster" as geometric sans paths ──
       Each glyph is hand-constructed with rounded strokes/terminals approximating
       Cabinet Grotesk 800 proportions. Baseline at y=58, cap height 34px.
       Total text starts at x=80, letter-spacing tight (-0.02em equivalent).

       Strategy: Use SVG text with embedded style as a fallback-safe approach.
       Since Cabinet Grotesk is loaded via Fontshare in the app's CSS, the SVG
       will render correctly when embedded in the HTML context. For standalone SVG
       use (e.g. OG image), we provide a geometric approximation via text element
       with font-family stack.

       For true path-only wordmark we hand-draw key letterforms below.
  -->

  <!-- "Ace Your" in primary blue, "Permit" in slate-900. Cabinet Grotesk 800 -->
  <text
    x="80" y="58"
    font-family="'Cabinet Grotesk', 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="40"
    letter-spacing="-1"
    fill="#2563EB"
    dominant-baseline="auto"
  >Ace Your</text>

  <text
    x="278" y="58"
    font-family="'Cabinet Grotesk', 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="40"
    letter-spacing="-1"
    fill="#0F172A"
    dominant-baseline="auto"
  >Permit</text>

  <!-- Orange needle-speed underline accent under "Permit" -->
  <rect x="278" y="64" width="4" height="4" rx="2" fill="#F97316"/>
  <rect x="286" y="65" width="60" height="3" rx="1.5" fill="#F97316" opacity="0.4"/>
</svg>
