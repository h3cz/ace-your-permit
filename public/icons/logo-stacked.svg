<svg xmlns="http://www.w3.org/2000/svg" width="240" height="200" viewBox="0 0 240 200" role="img" aria-label="Ace Your Permit">
  <defs>
    <linearGradient id="bgMark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- ── LOGOMARK: 120×120 squircle centred at x=120, bold checkmark (matches icon.svg) ── -->
  <rect x="60" y="0" width="120" height="120" rx="26" fill="url(#bgMark)"/>
  <path d="M 92.8 63.2 L 113.4 84.9 L 150 40.4" fill="none" stroke="#FFFFFF" stroke-width="13.6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="150" cy="40.4" r="7.5" fill="#F97316"/>

  <!-- ── WORDMARK stacked below mark ── -->
  <text
    x="120" y="158"
    font-family="'Cabinet Grotesk', 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="30"
    letter-spacing="-1"
    fill="#2563EB"
    text-anchor="middle"
    dominant-baseline="auto"
  >Ace Your</text>

  <text
    x="120" y="192"
    font-family="'Cabinet Grotesk', 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="34"
    letter-spacing="-1"
    fill="#0F172A"
    text-anchor="middle"
    dominant-baseline="auto"
  >Permit</text>
</svg>
