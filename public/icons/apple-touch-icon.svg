<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="DriveMaster">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.90"/>
    </linearGradient>
  </defs>

  <!-- iOS safe-area: full-bleed square, iOS applies squircle mask itself -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ~10% inset padding: content lives within 51px border, so effective canvas 410×410 centred at 256,256 -->
  <!-- Speedometer: centre 256,292  radius 148 (scaled down ~12% from 512 version) -->

  <!-- Arc: 210° sweep, same geometry scaled -->
  <!-- Start (195°): 256+148·cos(195°)=256−142.9=113, 292+148·sin(195°)=292−38.3=254 -->
  <!-- End   (345°): 256+148·cos(345°)=256+142.9=399, 292+148·sin(345°)=292−38.3=254 -->
  <path
    d="M 113 254 A 148 148 0 1 1 399 254"
    fill="none"
    stroke="url(#arcGrad)"
    stroke-width="32"
    stroke-linecap="round"
  />

  <!-- Tick marks -->
  <!-- 210°: r_inner=134,r_outer=152 → (256+134·cos210,292+134·sin210)=(140,225) → (256+152·cos210,292+152·sin210)=(124,216) -->
  <line x1="140" y1="225" x2="124" y2="216" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- 225°: → (161,197) → (148,184) -->
  <line x1="161" y1="197" x2="148" y2="184" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- 240°: → (189,176) → (180,161) -->
  <line x1="189" y1="176" x2="180" y2="161" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- 255°: → (221,157) → (217,140) -->
  <line x1="221" y1="157" x2="217" y2="140" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <!-- 270° top: → (256,158) → (256,140) -->
  <line x1="256" y1="158" x2="256" y2="140" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <!-- 285°: → (291,157) → (295,140) -->
  <line x1="291" y1="157" x2="295" y2="140" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <!-- 300°: → (323,176) → (332,161) -->
  <line x1="323" y1="176" x2="332" y2="161" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- 315°: → (351,197) → (364,184) -->
  <line x1="351" y1="197" x2="364" y2="184" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- 330°: → (372,225) → (388,216) -->
  <line x1="372" y1="225" x2="388" y2="216" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- Orange needle at ~330° (max) -->
  <!-- tip: 256+141·cos330=256+122=378, 292+141·sin330=292−70=222 -->
  <!-- tail (150°): 256+42·cos150=256−36=220, 292+42·sin150=292+21=313 -->
  <line x1="222" y1="312" x2="376" y2="222" stroke="#F97316" stroke-width="13" stroke-linecap="round"/>
  <circle cx="256" cy="292" r="20" fill="#F97316"/>
  <circle cx="256" cy="292" r="10" fill="#EA580C"/>

  <!-- D letterform, inset to safe area -->
  <rect x="196" y="336" width="26" height="84" rx="7" fill="white"/>
  <path d="M 218 336 h26 a 42 42 0 0 1 0 84 h-26 Z" fill="white"/>
  <path d="M 222 354 h16 a 24 24 0 0 1 0 48 h-16 Z" fill="url(#bg)"/>

  <!-- Orange accent bar -->
  <rect x="196" y="430" width="120" height="6" rx="3" fill="#F97316" opacity="0.85"/>
</svg>
