<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ace Your Permit">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- iOS safe-area: full-bleed square, iOS applies squircle mask itself -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ~10% inset padding: content lives within safe area centred at 256,270, radius 150 -->
  <circle cx="256" cy="270" r="150" fill="none" stroke="#0F172A" stroke-width="12"/>

  <path d="M 182 358 Q 182 316 222 316 Q 182 316 182 358 Z" fill="none" stroke="#0F172A" stroke-width="9" stroke-linejoin="round"/>
  <path d="M 330 358 Q 330 316 290 316 Q 330 316 330 358 Z" fill="none" stroke="#0F172A" stroke-width="9" stroke-linejoin="round"/>

  <circle cx="256" cy="270" r="122" fill="#F8FAFC"/>

  <g stroke="#0F172A" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="152" x2="256" y2="132"/>
    <line x1="202" y1="166" x2="191" y2="150"/>
    <line x1="160" y1="206" x2="142" y2="195"/>
    <line x1="310" y1="166" x2="321" y2="150"/>
    <line x1="352" y1="206" x2="370" y2="195"/>
  </g>

  <path d="M 190 310 A 94 94 0 0 1 256 190" fill="none" stroke="#F97316" stroke-width="9" stroke-linecap="round" opacity="0.85"/>

  <line x1="216" y1="308" x2="322" y2="200" stroke="#F97316" stroke-width="17" stroke-linecap="round"/>
  <path d="M 322 200 L 354 178 L 335 216 Z" fill="#F97316"/>

  <g fill="#F97316">
    <path d="M 364 158 l 7 19 l -19 -7 Z"/>
    <circle cx="376" cy="192" r="4"/>
  </g>

  <circle cx="256" cy="270" r="18" fill="#F97316"/>
  <circle cx="256" cy="270" r="9" fill="#EA580C"/>
</svg>
